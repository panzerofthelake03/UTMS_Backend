spring:
  application:
    name: utms-backend
  profiles:
    active: dev
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  auth:
    verification:
      code-expiration-seconds: ${AUTH_VERIFICATION_CODE_EXPIRATION_SECONDS:300}
      max-attempts: ${AUTH_VERIFICATION_MAX_ATTEMPTS:5}
      dev-expose-code: ${AUTH_VERIFICATION_DEV_EXPOSE_CODE:false}
    captcha:
      expiration-seconds: ${AUTH_CAPTCHA_EXPIRATION_SECONDS:180}
  mail:
    from: ${MAIL_FROM:no-reply@utms.local}
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-prod-change-me-in-prod}
      access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION:60}
      refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
  document:
    storage-dir: ${DOCUMENT_STORAGE_DIR:${java.io.tmpdir}/utms-documents}
    max-file-size-bytes: 2097152
    allowed-mime-types: application/pdf
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  mernis:
    simulate-unavailable: false

